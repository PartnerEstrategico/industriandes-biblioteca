<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IndustriAndes — Biblioteca de Conocimiento</title>
<style>
  :root {
    --marino: #1F4E79;
    --marino-suave: #2C5F91;
    --acero: #5A6269;
    --acero-claro: #98A0A6;
    --hueso: #F4F5F6;
    --naranja: #E8871E;
    --naranja-oscuro: #C96F0E;
    --exito: #4A7A5C;
    --borde: #DCE0E3;
    --texto: #24282B;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--hueso);
    color: var(--texto);
    min-height: 100vh;
  }

  /* ---------- LOGIN ---------- */
  #login-screen {
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #E9ECEF 0%, #DDE2E6 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.4s ease;
  }

  #login-screen.oculto {
    opacity: 0;
    pointer-events: none;
  }

  .login-card {
    background: white;
    border: 1px solid var(--borde);
    border-top: 4px solid var(--naranja);
    border-radius: 4px;
    padding: 44px 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 8px 30px rgba(31,78,121,0.12);
  }

  .login-card .logo {
    max-width: 220px;
    width: 100%;
    height: auto;
    margin-bottom: 20px;
  }

  .login-card p.subtitulo {
    color: var(--acero);
    font-size: 13px;
    margin-top: 0;
    margin-bottom: 32px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
  }

  .login-card input {
    width: 100%;
    padding: 12px 14px;
    border-radius: 3px;
    border: 1px solid var(--borde);
    background: var(--hueso);
    color: var(--texto);
    font-size: 15px;
    margin-bottom: 14px;
  }

  .login-card input:focus {
    outline: none;
    border-color: var(--naranja);
  }

  .login-card button {
    width: 100%;
    padding: 12px;
    border-radius: 3px;
    border: none;
    background: var(--naranja);
    color: white;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .login-card button:hover { background: var(--naranja-oscuro); }

  #login-error {
    color: #C0392B;
    font-size: 13px;
    margin-top: 12px;
    min-height: 16px;
  }

  .login-footer {
    margin-top: 28px;
    color: var(--acero-claro);
    font-size: 11px;
    letter-spacing: 0.5px;
  }

  /* ---------- APP ---------- */
  #app { display: none; }
  #app.visible { display: block; }

  header {
    background: white;
    padding: 20px 24px;
    border-bottom: 3px solid var(--naranja);
    box-shadow: 0 1px 6px rgba(31,78,121,0.06);
  }

  .marca {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 760px;
    margin: 0 auto;
  }

  .marca .logo {
    height: 40px;
    width: auto;
  }

  .marca .titulo-seccion {
    color: var(--acero);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 700;
    border-left: 2px solid var(--borde);
    padding-left: 14px;
  }

  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 24px 60px;
  }

  .buscador {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .buscador input {
    flex: 1;
    padding: 14px 16px;
    border-radius: 3px;
    border: 1px solid var(--acero-claro);
    font-size: 15px;
    background: white;
  }

  .buscador input:focus {
    outline: none;
    border-color: var(--naranja);
  }

  .buscador button {
    padding: 14px 24px;
    border-radius: 3px;
    border: none;
    background: var(--marino);
    color: white;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .buscador button:hover { background: var(--naranja); }
  .buscador button:disabled { background: var(--acero-claro); cursor: default; }

  .sugerencias {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 32px;
  }

  .sugerencias span {
    font-size: 12px;
    color: var(--acero);
    padding: 6px 12px;
    border: 1px solid var(--borde);
    border-radius: 20px;
    cursor: pointer;
    background: white;
  }

  .sugerencias span:hover {
    border-color: var(--naranja);
    color: var(--naranja-oscuro);
  }

  #estado {
    text-align: center;
    color: var(--acero);
    font-size: 14px;
    padding: 40px 0;
  }

  .resultado {
    background: white;
    border: 1px solid var(--borde);
    border-left: 4px solid var(--naranja);
    border-radius: 3px;
    padding: 20px 22px;
    margin-bottom: 14px;
  }

  .resultado-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 8px;
  }

  .resultado h3 {
    font-size: 16px;
    color: var(--marino);
    line-height: 1.4;
  }

  .etiqueta {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 20px;
    white-space: nowrap;
    font-weight: 600;
  }

  .etiqueta.alta { background: #E9F2EC; color: var(--exito); }
  .etiqueta.media { background: #FBEEE4; color: var(--naranja-oscuro); }

  .resultado .meta {
    font-size: 12px;
    color: var(--acero);
    margin-bottom: 10px;
  }

  .resultado .meta b { color: var(--texto); }

  .resultado p.descripcion {
    font-size: 14px;
    color: #444;
    line-height: 1.5;
    margin-bottom: 14px;
  }

  .resultado .acciones {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .resultado a.enlace {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--naranja-oscuro);
    text-decoration: none;
    padding: 8px 14px;
    border: 1px solid var(--naranja);
    border-radius: 3px;
  }

  .resultado a.enlace:hover { background: var(--naranja); color: white; }

  .resultado .acceso {
    font-size: 12px;
    color: var(--acero);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--hueso);
  }
</style>
</head>

      <span class="titulo-seccion">Biblioteca de Conocimiento</span>
    </div>
  </header>

  <main>
    <div class="buscador">
      <input type="text" id="pregunta-input" placeholder="Ej: ¿cómo se hace la conciliación bancaria?" autocomplete="off">
      <button id="buscar-btn" onclick="buscar()">Buscar</button>
    </div>

    <div class="sugerencias">
      <span onclick="buscarSugerencia(this)">control de calidad</span>
      <span onclick="buscarSugerencia(this)">pago a proveedores</span>
      <span onclick="buscarSugerencia(this)">inventario</span>
      <span onclick="buscarSugerencia(this)">recepción de mercancía</span>
      <span onclick="buscarSugerencia(this)">despacho de pedidos</span>
    </div>

    <div id="estado">Escribe una pregunta para buscar en la biblioteca.</div>
    <div id="resultados"></div>
  </main>
</div>

<script>
  const CONTRASENA_CORRECTA = "IndustriAndes2026";
  const WORKER_URL = "https://industriandes-biblioteca-api.jasv0808.workers.dev";

  function verificarAcceso() {
    const input = document.getElementById("password-input");
    const error = document.getElementById("login-error");
    if (input.value === CONTRASENA_CORRECTA) {
      document.getElementById("login-screen").classList.add("oculto");
      setTimeout(() => {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("app").classList.add("visible");
        document.getElementById("pregunta-input").focus();
      }, 400);
    } else {
      error.textContent = "Contraseña incorrecta. Intenta de nuevo.";
      input.value = "";
      input.focus();
    }
  }

  document.getElementById("password-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") verificarAcceso();
  });

  document.getElementById("pregunta-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") buscar();
  });

  function buscarSugerencia(el) {
    document.getElementById("pregunta-input").value = el.textContent;
    buscar();
  }

  async function buscar() {
    const pregunta = document.getElementById("pregunta-input").value.trim();
    const estado = document.getElementById("estado");
    const resultadosDiv = document.getElementById("resultados");
    const boton = document.getElementById("buscar-btn");

    if (!pregunta) return;

    boton.disabled = true;
    boton.textContent = "Buscando...";
    estado.style.display = "block";
    estado.textContent = "Consultando la biblioteca con IA, un momento...";
    resultadosDiv.innerHTML = "";

    try {
      const respuesta = await fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pregunta })
      });

      const datos = await respuesta.json();

      if (datos.error) {
        estado.textContent = "Ocurrió un error: " + datos.error;
        return;
      }

      const resultados = datos.resultados || [];

      if (resultados.length === 0) {
        estado.textContent = "No se encontraron procesos relacionados con tu búsqueda.";
        return;
      }

      estado.style.display = "none";
      resultadosDiv.innerHTML = resultados.map(r => renderResultado(r)).join("");

    } catch (err) {
      estado.textContent = "No se pudo conectar con la biblioteca. Intenta de nuevo en unos segundos.";
    } finally {
      boton.disabled = false;
      boton.textContent = "Buscar";
    }
  }

  function renderResultado(r) {
    const relevancia = (r.relevancia || "media").toLowerCase();
    const etiquetaTexto = relevancia === "alta" ? "Alta relevancia" : "Relacionado";

    const tieneVideo = r.Enlace_Video && r.Enlace_Video.toString().trim() !== "" && r.Enlace_Video.toLowerCase() !== "no aplica";
    const tieneDocumento = r.Enlace_Documento && r.Enlace_Documento.toString().trim() !== "" && r.Enlace_Documento.toLowerCase() !== "no aplica";

    let acciones = "";
    if (tieneVideo) {
      const url = r.Enlace_Video.startsWith("http") ? r.Enlace_Video : "#";
      acciones += `<a class="enlace" href="${url}" target="_blank">▶ Ver video</a>`;
    }
    if (tieneDocumento) {
      const url = r.Enlace_Documento.startsWith("http") ? r.Enlace_Documento : "#";
      acciones += `<a class="enlace" href="${url}" target="_blank">↗ Ver documento</a>`;
    }

    return `
      <div class="resultado">
        <div class="resultado-header">
          <h3>${escapeHtml(r.Titulo || "Sin título")}</h3>
          <span class="etiqueta ${relevancia}">${etiquetaTexto}</span>
        </div>
        <div class="meta"><b>${escapeHtml(r.Tipo || "")}</b> · ${escapeHtml(r.Proceso || "")}</div>
        <p class="descripcion">${escapeHtml(r.Descripcion || "")}</p>
        <div class="acciones">${acciones || '<span style="font-size:13px;color:var(--acero);">Sin enlace disponible</span>'}</div>
        ${r.Acceso ? `<div class="acceso"><b>Acceso:</b> ${escapeHtml(r.Acceso)}</div>` : ""}
      </div>
    `;
  }

  function escapeHtml(texto) {
    const div = document.createElement("div");
    div.textContent = texto;
    return div.innerHTML;
  }
</script>

</body>
</html>
